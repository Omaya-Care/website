    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Omaya Care?","acceptedAnswer":{"@type":"Answer","text":"Omaya Care is a postpartum care service that checks in on mothers after they leave the hospital. We reach out via voice call or WhatsApp at key moments in the weeks after birth, asking about your physical health, emotional wellbeing, and how the baby is doing. If anything concerns us, we alert your care team immediately."}},{"@type":"Question","name":"Who is behind Omaya Care?","acceptedAnswer":{"@type":"Answer","text":"Omaya Care is a Ghanaian health technology company. Our check-in content is built with and reviewed by licensed midwives. We do not operate independently of clinical oversight — everything we communicate to you has been approved by a qualified health professional."}},{"@type":"Question","name":"Is Omaya Care a hospital?","acceptedAnswer":{"@type":"Answer","text":"No. We are not a hospital, clinic, or medical practice. We are a technology-enabled care support service that works alongside the hospital or clinic that delivered your baby."}},{"@type":"Question","name":"Is Omaya Care free for me?","acceptedAnswer":{"@type":"Answer","text":"Omaya Care is provided to you through your hospital. Any questions about costs should be directed to your hospital or clinic."}},{"@type":"Question","name":"How do I get enrolled in Omaya Care?","acceptedAnswer":{"@type":"Answer","text":"Your hospital or clinic enrolls you. If you gave birth at a hospital that uses Omaya Care, a staff member will explain the service and confirm your enrollment before or shortly after discharge."}},{"@type":"Question","name":"What information does my hospital share with Omaya Care?","acceptedAnswer":{"@type":"Answer","text":"Your hospital shares your name, phone number, delivery date, and preferred language. This is the minimum information we need to contact you at the right times in the right language."}},{"@type":"Question","name":"Can I opt out?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can opt out at any time by telling your hospital or by sending a message to admin@omayacare.com. We will stop contacting you immediately. Your hospital remains responsible for your postnatal care after you opt out."}},{"@type":"Question","name":"What if I change my phone number?","acceptedAnswer":{"@type":"Answer","text":"Let your hospital know as soon as possible so they can update your contact details with us. If we cannot reach you, we cannot check in on you."}},{"@type":"Question","name":"When will Omaya Care contact me?","acceptedAnswer":{"@type":"Answer","text":"We follow the World Health Organization's recommended postnatal contact schedule: within 24 hours of birth, on day 3, between days 7 and 14, and at six weeks after birth. Your hospital may adjust this depending on your specific needs."}},{"@type":"Question","name":"How will Omaya Care contact me?","acceptedAnswer":{"@type":"Answer","text":"By voice call or WhatsApp message, whichever you indicated as your preference when enrolled. If we cannot reach you by your preferred channel, we may try the other."}},{"@type":"Question","name":"What language will the check-in be in?","acceptedAnswer":{"@type":"Answer","text":"We will use the language you indicated when you were enrolled. If you would like to change your language preference, contact your hospital."}},{"@type":"Question","name":"What if my baby is asleep and I cannot talk?","acceptedAnswer":{"@type":"Answer","text":"You can respond via WhatsApp instead. We understand that as a new mother your time and energy are not always available on schedule. If you miss a check-in, we will try again. If you need to reschedule, send us a message at admin@omayacare.com."}},{"@type":"Question","name":"What kind of questions will I be asked?","acceptedAnswer":{"@type":"Answer","text":"Questions cover your physical health — for example bleeding, pain, fever, and headaches — your emotional wellbeing, and how you and the baby are managing. The questions are straightforward and do not take long to answer. Everything asked has been reviewed and approved by a licensed midwife."}},{"@type":"Question","name":"What happens with my answers?","acceptedAnswer":{"@type":"Answer","text":"Your responses are reviewed by or shared with your care team at your hospital. If something in your responses suggests a concern, the appropriate person will be alerted — whether that is your midwife, an on-call nurse, or another specialist depending on the nature of the concern."}},{"@type":"Question","name":"What happens if I report a serious symptom?","acceptedAnswer":{"@type":"Answer","text":"If your response triggers an urgent flag, Omaya Care will alert the on-call clinical team at your hospital immediately and provide you with clear guidance on what to do next, including directing you to an emergency facility if needed. You will not be left without direction."}},{"@type":"Question","name":"What if nobody from the hospital calls me back?","acceptedAnswer":{"@type":"Answer","text":"In a true emergency, do not wait for a callback. Go directly to the nearest hospital emergency unit or call emergency services. Omaya Care will simultaneously be working through the escalation chain to alert your care team, but your safety comes first and you should not wait."}},{"@type":"Question","name":"Is Omaya Care available at night and on weekends?","acceptedAnswer":{"@type":"Answer","text":"Yes. Omaya Care operates 24 hours a day, 7 days a week. Your hospital's clinical escalation chain has been set up to ensure someone is reachable at all times."}},{"@type":"Question","name":"Can I contact Omaya Care between scheduled check-ins if I have a concern?","acceptedAnswer":{"@type":"Answer","text":"Yes. Send a message to admin@omayacare.com at any time. If it is a medical emergency, please also seek emergency care immediately without waiting for a response."}},{"@type":"Question","name":"Is my information kept private?","acceptedAnswer":{"@type":"Answer","text":"Yes. Your personal and health data is stored securely and shared only with your clinical care team at your hospital and with specialists involved in your care. We do not sell your data or use it for advertising. See our full Privacy Policy for details."}},{"@type":"Question","name":"Who can see my check-in responses?","acceptedAnswer":{"@type":"Answer","text":"Your midwife and the clinical team at your hospital. No one else unless your care requires a specialist referral, in which case only the relevant information is shared."}},{"@type":"Question","name":"Can I request my data?","acceptedAnswer":{"@type":"Answer","text":"Yes. Contact us at admin@omayacare.com and we will provide a copy of the data we hold about you within 30 days."}},{"@type":"Question","name":"Can I ask you to delete my data?","acceptedAnswer":{"@type":"Answer","text":"Yes. Contact us at admin@omayacare.com. Note that in some cases we may be required by law to retain certain health records for a defined period."}},{"@type":"Question","name":"How does my hospital use Omaya Care?","acceptedAnswer":{"@type":"Answer","text":"Hospitals use Omaya Care to deliver postnatal check-ins to mothers after discharge, without placing the burden on already stretched midwife teams. The clinical dashboard gives your care team a clear view of which mothers have been checked in on, which are flagged for follow-up, and what was communicated in each interaction."}},{"@type":"Question","name":"Who reviews the check-in content?","acceptedAnswer":{"@type":"Answer","text":"The check-in questions and all information communicated to mothers are reviewed and signed off by a licensed senior midwife before being used. Your clinical team retains oversight and can request changes to the content at any time."}},{"@type":"Question","name":"How does escalation work?","acceptedAnswer":{"@type":"Answer","text":"When a mother's response crosses a clinical threshold, Omaya Care alerts the escalation chain established with your hospital: typically the senior midwife, then the on-call midwife's phone, then the head of nurses. Each tier has an agreed response time window. For true emergencies, the mother is directed to seek care immediately in parallel with the alert."}},{"@type":"Question","name":"How do we get started?","acceptedAnswer":{"@type":"Answer","text":"Contact us at admin@omayacare.com to discuss a pilot partnership."}}]}</script>
